name: dotnet-ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Trade.Reviewer.slnx

      - name: Build
        run: dotnet build Trade.Reviewer.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Trade.Reviewer.slnx --no-build --configuration Release
